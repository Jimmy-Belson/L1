<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBITRON - COMBAT SECTOR</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="game.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <canvas id="starfield"></canvas>
    
    <a href="index.html" class="back-btn">[ RETURN TO STATION ]</a>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <aside class="leaderboard">
            <h3>TACTICAL LOG</h3>
            <ul id="highscores-list">
                <li><span>LOADING...</span></li>
            </ul>
        </aside>
    </div>

<script type="module" src="script.js"></script> 

<script type="module" src="ranks.js"></script>
<script type="module" src="game.js"></script>

<script type="module">
    import { getRankByScore } from './ranks.js';

    async function loadLeaderboard() {
        const list = document.getElementById('highscores-list');
        // Ждем, пока Core и Core.sb появятся в окне
        if (!window.Core || !window.Core.sb) {
            setTimeout(loadLeaderboard, 100);
            return;
        }

        const { data, error } = await window.Core.sb
            .from('profiles')
            .select('nickname, combat_score')
            .order('combat_score', { ascending: false })
            .limit(10);

        if (error) {
            list.innerHTML = '<li><span>[ SYSTEM_ERROR ]</span></li>';
            return;
        }

        list.innerHTML = ''; 
        data.forEach((entry, index) => {
            const li = document.createElement('li');
            const rank = getRankByScore(entry.combat_score || 0);
            li.innerHTML = `
                <span>${index + 1}. ${entry.nickname || 'Pilot'}</span>
                <span style="color: ${rank.color}; text-shadow: 0 0 5px ${rank.color}">
                    ${entry.combat_score || 0}
                </span>
            `;
            list.appendChild(li);
        });
    }

    // Инициализация при загрузке
    const initGameSession = async () => {
        // Ждем Core.sb
        if (window.Core && window.Core.sb) {
            try {
                const { data: { session } } = await window.Core.sb.auth.getSession();
                if (!session) {
                    window.location.replace('station.html');
                } else {
                    window.Core.user = session.user;
                    window.gameActive = true;
                    loadLeaderboard();
                }
            } catch (e) {
                console.error("Auth failed:", e);
            }
        } else {
            setTimeout(initGameSession, 100);
        }
    };

    initGameSession();
</script>
    
</body>
</html>
