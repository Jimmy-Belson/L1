<script type="module">
    import { getRankByScore } from './ranks.js';

    /**
     * Основная логика запуска боевого сектора
     */
    async function bootstrap() {
        console.log("%c[SYSTEM] Waiting for ORBITRON_CORE...", "color: #0ff");

        // Функция ожидания появления Core в window
        const getCore = () => {
            return new Promise((resolve) => {
                // Если Core уже готов
                if (window.Core && window.Core.sb) return resolve(window.Core);
                
                // Если нет — подписываемся на событие или проверяем интервалом
                const check = setInterval(() => {
                    if (window.Core && window.Core.sb) {
                        clearInterval(check);
                        resolve(window.Core);
                    }
                }, 100);
            });
        };

        try {
            const Core = await getCore();
            console.log("%c[SYSTEM] Core detected. Verifying session...", "color: #0ff");

            // Проверяем авторизацию через Supabase
            const { data: { session }, error } = await Core.sb.auth.getSession();

            if (error || !session) {
                console.warn("No active session. Ejecting to station.");
                window.location.replace('station.html');
                return;
            }

            // Устанавливаем данные пользователя в Core
            Core.user = session.user;
            
            // Активируем игру (убирает экран ожидания)
            window.gameActive = true; 
            console.log("%c[SYSTEM] Combat sector engaged.", "color: #0f0");

            // Загружаем лог рекордов
            await updateTacticalLog(Core);

        } catch (err) {
            console.error("BOOTSTRAP_CRITICAL_ERROR:", err);
        }
    }

    /**
     * Загрузка топ-10 пилотов в Tactical Log
     */
    async function updateTacticalLog(Core) {
        const logList = document.getElementById('highscores-list');
        if (!logList) return;

        const { data, error } = await Core.sb
            .from('profiles')
            .select('nickname, combat_score')
            .order('combat_score', { ascending: false })
            .limit(10);

        if (error) {
            logList.innerHTML = '<li style="color:red">[ LINK_ERROR ]</li>';
            return;
        }

        logList.innerHTML = ''; 
        
        if (!data || data.length === 0) {
            logList.innerHTML = '<li>[ NO_DATA_FOUND ]</li>';
            return;
        }

        data.forEach((pilot, i) => {
            const rank = getRankByScore(pilot.combat_score || 0);
            const li = document.createElement('li');
            li.style.borderLeft = `2px solid ${rank.color}`;
            li.innerHTML = `
                <span class="rank-index">${i + 1}.</span>
                <span class="pilot-name">${(pilot.nickname || 'Unknown').toUpperCase()}</span>
                <span class="pilot-xp" style="color: ${rank.color}; text-shadow: 0 0 5px ${rank.color}">
                    ${pilot.combat_score || 0} XP
                </span>
            `;
            logList.appendChild(li);
        });
    }

    // Инициализация
    bootstrap();
</script>
