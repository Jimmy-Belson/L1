<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBITRON - COMBAT SECTOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* 1. Полная изоляция страницы боя */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #01050a; /* Глубокий космос */
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
        }

        /* 2. Холст - живые обои (Игра) */
        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; 
            display: block;
            background: #000;
        }

        /* 3. Интерфейс - слой поверх игры */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Пропускает клики к врагам */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 4. Контейнер интерфейса (Сетка/Лидерборд) */
        .game-container {
            pointer-events: auto; /* Возвращаем клики кнопкам */
            background: rgba(0, 10, 20, 0.85);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.05);
            min-width: 300px;
            position: relative;
        }

        /* Кнопка выхода */
        .back-btn {
            position: absolute;
            top: -45px;
            left: 0;
            color: #0ff;
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 12px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 5px 15px;
            background: rgba(0, 10, 20, 0.9);
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 15px #0ff;
        }

        /* Лидерборд */
        .leaderboard h3 {
            font-family: 'Orbitron';
            color: #0ff;
            font-size: 14px;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 5px;
        }

        #highscores-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            margin-bottom: 4px;
            font-size: 12px;
            background: rgba(0, 255, 255, 0.03);
            border-left: 3px solid transparent;
        }

        /* Экран загрузки */
        .waiting-overlay {
            position: fixed;
            inset: 0;
            background: #01050a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #0ff;
            gap: 20px;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: rgba(0, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .loader-bar::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #0ff;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="waiting-overlay">
        <div style="font-family: 'Orbitron'; letter-spacing: 3px;">ESTABLISHING_LINK...</div>
        <div class="loader-bar"></div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div class="game-container">
        <a href="index.html" class="back-btn">[ EXIT_TO_STATION ]</a>
        
        <div class="tactical-log">
            <h3>Tactical Log</h3>
            <ul id="highscores-list">
                <li style="opacity: 0.5;">SCANNING_SECTOR...</li>
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="init-core.js"></script> <script src="script.js" type="module"></script> <script type="module">
        /* Твой код из bootstrap (getCore, bootstrap, updateTacticalLog) оставляй без изменений, 
           но убедись, что внутри updateTacticalLog ID совпадает: 'highscores-list' */
    </script>

    <script type="module" src="./game.js"></script>
</body>

</html>
