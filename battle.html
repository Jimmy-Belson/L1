<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden; /* Убираем прокрутку */
        background-color: #000; /* Черный фон по умолчанию */
    }

    #starfield {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0; /* Игра на заднем плане */
        display: block;
    }

    /* Слой для интерфейса, чтобы он был поверх игры */
    .ui-layer {
        position: relative;
        z-index: 10;
        pointer-events: none; /* Чтобы можно было кликать сквозь пустые места по врагам */
    }
    
    .ui-layer * {
        pointer-events: auto; /* Возвращаем клики для кнопок и чата */
    }
</style>

<canvas id="starfield"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="./script.js"></script>

<script type="module">
    import { getRankByScore } from './ranks.js';

    async function bootstrap() {
        console.log("%c[SYSTEM] Waiting for ORBITRON_CORE...", "color: #0ff");

        const getCore = () => {
            return new Promise((resolve) => {
                const check = () => {
                    // Проверяем наличие Core и инициализированного Canvas
                    if (window.Core && window.Core.sb && window.Core.Canvas) {
                        console.log("%c[SYSTEM] Core link established.", "color: #0f0");
                        resolve(window.Core);
                        return true;
                    }
                    return false;
                };

                if (!check()) {
                    const timer = setInterval(() => { if (check()) clearInterval(timer); }, 50);
                    window.addEventListener('core-ready', () => { if (check()) clearInterval(timer); }, { once: true });
                    
                    setTimeout(() => {
                        if (!window.Core) {
                            clearInterval(timer);
                            console.error("CRITICAL: script.js failed to load.");
                            const statusText = document.querySelector('.waiting-text');
                            if (statusText) statusText.innerText = "CORE_NOT_FOUND";
                        }
                    }, 5000);
                }
            });
        };

        try {
            const Core = await getCore();
            
            const { data: { session }, error } = await Core.sb.auth.getSession();
            if (error || !session) {
                window.location.replace('station.html');
                return;
            }

            Core.user = session.user;

            // Скрываем загрузочный экран
            const overlay = document.getElementById('loading-screen') || document.querySelector('.waiting-overlay');
            if (overlay) {
                overlay.style.transition = 'opacity 0.8s ease';
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 800);
            }

            // --- ВАЖНО: Принудительно запускаем отрисовку, если она не стартовала ---
            window.gameActive = true; 
            if (Core.Canvas && typeof Core.Canvas.res === 'function') {
                Core.Canvas.res(); // Подгоняем размер под экран
            }
            
            console.log("%c[SYSTEM] Combat sector engaged.", "color: #0f0");

            if (typeof Core.SyncProfile === 'function') await Core.SyncProfile(Core.user);
            await updateTacticalLog(Core);

        } catch (err) {
            console.error("BOOTSTRAP_ERROR:", err);
        }
    }

    async function updateTacticalLog(Core) {
        const logList = document.getElementById('highscores-list');
        if (!logList) return;

        logList.innerHTML = '<li class="loading-log">SCANNING_SECTOR...</li>';

        const { data, error } = await Core.sb
            .from('profiles')
            .select('nickname, combat_score')
            .order('combat_score', { ascending: false })
            .limit(10);

        if (error) {
            logList.innerHTML = '<li style="color:#f00">[ LINK_ERROR ]</li>';
            return;
        }

        logList.innerHTML = ''; 
        data.forEach((pilot, i) => {
            const score = pilot.combat_score || 0;
            const rank = getRankByScore(score);
            const li = document.createElement('li');
            li.style.borderLeft = `3px solid ${rank.color}`;
            li.style.background = "rgba(0, 255, 255, 0.03)";
            li.style.marginBottom = "4px";
            li.style.padding = "5px 10px";
            li.innerHTML = `
                <span style="opacity:0.5; font-size:10px;">0${i+1}</span>
                <span style="margin-left:10px; flex-grow:1;">${(pilot.nickname || 'Unknown').toUpperCase()}</span>
                <span style="color:${rank.color}; text-shadow:0 0 5px ${rank.color}">${score} XP</span>
            `;
            logList.appendChild(li);
        });
    }


    bootstrap();
</script>
