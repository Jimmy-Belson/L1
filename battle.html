<script type="module">
    import { getRankByScore } from './ranks.js';

    /**
     * Основная логика запуска боевого сектора
     */
    async function bootstrap() {
        console.log("%c[SYSTEM] Waiting for ORBITRON_CORE...", "color: #0ff");

        // Улучшенный поиск Core в глобальном пространстве
        const getCore = () => {
            return new Promise((resolve) => {
                const check = () => {
                    if (window.Core && window.Core.sb) {
                        console.log("%c[SYSTEM] Core link established.", "color: #0f0");
                        resolve(window.Core);
                        return true;
                    }
                    return false;
                };

                if (!check()) {
                    const timer = setInterval(() => { if (check()) clearInterval(timer); }, 50);
                    window.addEventListener('core-ready', () => { if (check()) clearInterval(timer); }, { once: true });
                }
            });
        };

        try {
            const Core = await getCore();
            
            // Проверяем сессию
            const { data: { session }, error } = await Core.sb.auth.getSession();

            if (error || !session) {
                console.warn("ACCESS_DENIED: Redirecting to station.");
                window.location.replace('station.html');
                return;
            }

            Core.user = session.user;

            // --- ДОБАВЛЕНО: Плавное скрытие экрана загрузки ---
            const overlay = document.getElementById('loading-screen') || document.querySelector('.waiting-overlay');
            if (overlay) {
                overlay.style.transition = 'opacity 0.8s ease, visibility 0.8s';
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 800);
            }

            // Активируем игровые системы
            window.gameActive = true; 
            console.log("%c[SYSTEM] Combat sector engaged. Welcome, Pilot.", "color: #0f0");

            // Синхронизируем профиль игрока (чтобы обновить его локальный ранг)
            if (typeof Core.SyncProfile === 'function') {
                await Core.SyncProfile(Core.user);
            }

            // Загружаем лог рекордов
            await updateTacticalLog(Core);

        } catch (err) {
            console.error("BOOTSTRAP_CRITICAL_ERROR:", err);
            // Если всё совсем плохо, показываем ошибку на экране
            const statusText = document.querySelector('.waiting-text');
            if (statusText) statusText.innerText = "SYSTEM_CRITICAL_FAILURE";
        }
    }

    /**
     * Загрузка топ-10 пилотов в Tactical Log
     */
    async function updateTacticalLog(Core) {
        const logList = document.getElementById('highscores-list');
        if (!logList) return;

        // Показываем статус загрузки
        logList.innerHTML = '<li class="loading-log">SCANNING_SECTOR...</li>';

        const { data, error } = await Core.sb
            .from('profiles')
            .select('nickname, combat_score')
            .order('combat_score', { ascending: false })
            .limit(10);

        if (error) {
            console.error("FETCH_LOG_ERROR:", error);
            logList.innerHTML = '<li style="color:#f00">[ LINK_ERROR ]</li>';
            return;
        }

        logList.innerHTML = ''; 
        
        if (!data || data.length === 0) {
            logList.innerHTML = '<li>[ NO_PILOTS_IN_RANGE ]</li>';
            return;
        }

        data.forEach((pilot, i) => {
            const score = pilot.combat_score || 0;
            const rank = getRankByScore(score);
            const li = document.createElement('li');
            
            // Стилизация строки лога
            li.style.borderLeft = `3px solid ${rank.color}`;
            li.style.marginBottom = "5px";
            li.style.background = "rgba(0, 255, 255, 0.03)";
            
            li.innerHTML = `
                <span class="rank-index" style="opacity: 0.5; font-size: 0.8em;">0${i + 1}</span>
                <span class="pilot-name" style="margin-left: 10px; flex-grow: 1;">${(pilot.nickname || 'Unknown').toUpperCase()}</span>
                <span class="pilot-xp" style="color: ${rank.color}; text-shadow: 0 0 8px ${rank.color}; font-family: 'Share Tech Mono';">
                    ${score.toLocaleString()} XP
                </span>
            `;
            logList.appendChild(li);
        });
    }

    // Запуск системы
    bootstrap();
</script>
