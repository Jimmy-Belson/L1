<script type="module">
    
    import { getRankByScore } from './ranks.js';

    async function initSystem() {
        console.log("Waiting for Core...");
        
        // 1. Ждем появления объекта Core в глобальном окне
        const waitForCore = () => {
            return new Promise(resolve => {
                if (window.Core && window.Core.sb) return resolve(window.Core);
                const interval = setInterval(() => {
                    if (window.Core && window.Core.sb) {
                        clearInterval(interval);
                        resolve(window.Core);
                    }
                }, 50);
            });
        };

        const Core = await waitForCore();
        console.log("Core detected. Checking session...");

        // 2. Проверяем сессию
        const { data: { session }, error } = await Core.sb.auth.getSession();

        if (error || !session) {
            console.log("No session, redirecting...");
            window.location.replace('station.html');
            return;
        }

        Core.user = session.user;
        window.gameActive = true;
        console.log("Session active. Loading leaderboard...");

        // 3. Загружаем лидерборд
        await loadLeaderboard(Core);
    }

    async function loadLeaderboard(Core) {
        const list = document.getElementById('highscores-list');
        if (!list) return;

        const { data, error } = await Core.sb
            .from('profiles')
            .select('nickname, combat_score')
            .order('combat_score', { ascending: false })
            .limit(10);

        if (error) {
            console.error("Supabase Error:", error);
            list.innerHTML = '<li><span>[ CONNECTION_ERROR ]</span></li>';
            return;
        }

        list.innerHTML = ''; 
        if (!data || data.length === 0) {
            list.innerHTML = '<li><span>[ NO_DATA ]</span></li>';
            return;
        }

        data.forEach((entry, index) => {
            const li = document.createElement('li');
            const rank = getRankByScore(entry.combat_score || 0);
            li.innerHTML = `
                <span>${index + 1}. ${entry.nickname || 'Pilot'}</span>
                <span style="color: ${rank.color}; text-shadow: 0 0 5px ${rank.color}">
                    ${entry.combat_score || 0}
                </span>
            `;
            list.appendChild(li);
        });
    }

    // Запускаем всё
    initSystem();
</script>
