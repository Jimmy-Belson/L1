<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBITRON - COMBAT SECTOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* 1. Полная изоляция страницы боя */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #01050a; /* Глубокий космос */
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
        }

        /* 2. Холст - живые обои (Игра) */
        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; 
            display: block;
            background: #000;
        }

        /* 3. Интерфейс - слой поверх игры */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Пропускает клики к врагам */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 4. Контейнер интерфейса (Сетка/Лидерборд) */
        .game-container {
            pointer-events: auto; /* Возвращаем клики кнопкам */
            background: rgba(0, 10, 20, 0.85);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.05);
            min-width: 300px;
            position: relative;
        }

        /* Кнопка выхода */
        .back-btn {
            position: absolute;
            top: -45px;
            left: 0;
            color: #0ff;
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 12px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 5px 15px;
            background: rgba(0, 10, 20, 0.9);
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 15px #0ff;
        }

        /* Лидерборд */
        .leaderboard h3 {
            font-family: 'Orbitron';
            color: #0ff;
            font-size: 14px;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 5px;
        }

        #highscores-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            margin-bottom: 4px;
            font-size: 12px;
            background: rgba(0, 255, 255, 0.03);
            border-left: 3px solid transparent;
        }

        /* Экран загрузки */
        .waiting-overlay {
            position: fixed;
            inset: 0;
            background: #01050a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #0ff;
            gap: 20px;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: rgba(0, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .loader-bar::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #0ff;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            100% { left: 100%; }
        }
    </style>
</head>
<body>

    <div class="waiting-overlay">
        <div style="font-family: 'Orbitron'; letter-spacing: 3px;">ESTABLISHING_LINK...</div>
        <div class="loader-bar"></div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div class="ui-layer">
        <div class="game-container">
            <a href="index.html" class="back-btn">[ EXIT_TO_STATION ]</a>
            
            <div class="leaderboard">
                <h3>Tactical Log</h3>
                <ul id="highscores-list">
                    <li style="opacity: 0.5;">SCANNING_SECTOR...</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="module" src="./game.js"></script>

<script type="module">
        import { getRankByScore } from './ranks.js';

        // 1. ФУНКЦИЯ ПОИСКА ЯДРА (ОБЯЗАТЕЛЬНО!)
        const getCore = () => {
            return new Promise((resolve) => {
                let attempts = 0;
                const check = () => {
                    attempts++;
                    // Проверяем, появилось ли Core и инициализирован ли Supabase (sb)
                    if (window.Core && window.Core.sb) {
                        resolve(window.Core);
                        return true;
                    }
                    // Если прошло 5 секунд (100 попыток по 50мс)
                    if (attempts > 100) {
                        resolve(window.Core || {}); 
                        return true;
                    }
                    return false;
                };
                const timer = setInterval(() => { if (check()) clearInterval(timer); }, 50);
            });
        };

        // 2. ОСНОВНАЯ ФУНКЦИЯ ЗАПУСКА
        async function bootstrap() {
            // Исправлено: ищем правильный селектор оверлея
            const overlay = document.querySelector('.waiting-overlay');
            
            try {
                console.log("SYSTEM: INITIATING_BOOTSTRAP...");
                const Core = await getCore();

                // Проверка: готов ли клиент Supabase
                if (!Core || !Core.sb) {
                    console.warn("BOOTSTRAP_PENDING: Core.sb not found, retrying...");
                    setTimeout(bootstrap, 200);
                    return;
                }

                // Проверка сессии
                const { data: { session }, error } = await Core.sb.auth.getSession();
                
                if (error || !session) {
                    console.error("AUTH_REQUIRED: Redirecting to station...");
                    window.location.replace('station.html');
                    return;
                }

                // Устанавливаем пользователя в Core
                Core.user = session.user;

                // Принудительно запускаем инициализацию холста (если еще не запущен)
                if (Core.Canvas && typeof Core.Canvas.init === 'function') {
                    Core.Canvas.init();
                    Core.Canvas.res(); // Растягиваем на весь экран
                }

                // Убираем загрузку (красивое исчезновение)
                if (overlay) {
                    overlay.style.transition = 'opacity 0.8s ease, filter 0.8s ease';
                    overlay.style.opacity = '0';
                    overlay.style.filter = 'blur(10px)';
                    setTimeout(() => overlay.remove(), 800);
                }

                console.log("%c[BOOTSTRAP] SUCCESS: COMBAT_LINK_ACTIVE", "color: #0f0");

                // Обновляем лог игроков
                await updateTacticalLog(Core);

            } catch (err) {
                console.error("BOOTSTRAP_CRITICAL_FAILURE:", err);
                // План Б: Убираем экран если всё зависло
                setTimeout(() => { if(overlay) overlay.remove(); }, 3000);
            }
        }

        // 3. ФУНКЦИЯ ОБНОВЛЕНИЯ ЛОГА
        async function updateTacticalLog(Core) {
            const logList = document.getElementById('highscores-list');
            if (!logList || !Core.sb) return;

            const { data, error } = await Core.sb
                .from('profiles')
                .select('nickname, combat_score')
                .order('combat_score', { ascending: false })
                .limit(10);

            if (error) {
                logList.innerHTML = '<li style="color:#f00; font-size:10px;">LINK_ERROR: DATABASE_OFFLINE</li>';
                return;
            }

            logList.innerHTML = ''; 
            data.forEach((pilot, i) => {
                const score = pilot.combat_score || 0;
                const rank = getRankByScore(score);
                const li = document.createElement('li');
                li.className = 'log-entry';
                li.style.borderLeft = `3px solid ${rank.color}`;
                li.innerHTML = `
                    <span style="opacity:0.5; font-size:10px;">0${i+1}</span>
                    <span style="margin-left:10px; flex-grow:1;">${(pilot.nickname || 'Unknown').toUpperCase()}</span>
                    <span style="color:${rank.color}; text-shadow: 0 0 5px ${rank.color}">${score} XP</span>
                `;
                logList.appendChild(li);
            });
        }

        // ПОЕХАЛИ!
        bootstrap();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="init-core.js"></script>
<script src="script.js" type="module"></script>

</body>
</html>
