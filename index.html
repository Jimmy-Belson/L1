<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBITRON - STATION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 
    <img id="planet-pic" src="https://png.pngtree.com/png-vector/20240123/ourmid/pngtree-uranus-planet-illustration-png-image_11466428.png" style="display:none;" />
</head>
<body>
    <div id="ambient-station">
        <img src="space.png" alt="station">
        <div class="station-id-label">STATION_ID: OLYMPUS_REMNANT</div>
        <div class="scan-effect"></div>
    </div>

    <div id="notify-container"></div>
    <div id="custom-menu"></div>

    <canvas id="starfield"></canvas>

    <div class="os-container">
        
        <header>
            <div id="system-status"><span class="blink">●</span> SYSTEM_READY</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div id="clock">00:00:00</div>
                
                <div class="nav-controls" style="display: flex; gap: 10px;">
                    <button class="btn-profile" onclick="window.location.href='profile.html'">
                        [ PROFILE ]
                    </button>
                    <button class="btn-logout" onclick="Core.Logout()">
                        [ ABANDON_SHIP ]
                    </button>
                </div>
            </div>
        </header>

        <div class="main-area">
            
            <section class="panel todo-panel">
                <div style="padding: 15px; border-bottom: 1px solid var(--border); font-family: 'Orbitron'; font-size: 12px;">MISSION_OBJECTIVES</div>
                <div style="padding: 15px;">
                    <input type="text" id="todo-in" placeholder="ADD_OBJECTIVE..." style="width: 100%;">
                </div>
                <div id="todo-list"></div>
            </section>

            <div class="chat-wrapper">
                <section class="panel chat-panel">
                    <div style="padding: 15px; border-bottom: 1px solid var(--border); font-family: 'Orbitron'; font-size: 12px;">COMM_LINK</div>
                    <div id="chat-stream"></div>
                    
                    <div class="input-box" style="display: flex; gap: 5px; align-items: center; padding: 10px;">
                        <input type="text" id="chat-in" placeholder="TYPE_MESSAGE..." maxlength="100" style="flex: 1;">
                        <button id="chat-send-btn" onclick="Core.Chat.send()" title="SEND_DATA">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </section>
            </div>

        </div>

        <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div class="audio-link" id="audio-btn" onclick="Core.Audio.toggle()">
                <div class="bars">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
                <span>MUSIC_ENGINE</span>
            </div>
            <div style="font-size: 10px; opacity: 0.5;">LOC: ORBIT_STATION_L1</div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
