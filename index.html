<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBITRON - STATION</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    

 
    <img id="planet-pic" src="https://png.pngtree.com/png-vector/20240123/ourmid/pngtree-uranus-planet-illustration-png-image_11466428.png" style="display:none;" />
</head>
<body>


    <div id="notify-container"></div>
    <div id="custom-menu"></div>

    <canvas id="starfield"></canvas>

    <div class="os-container">
        
        <header>
            <div id="system-status"><span class="blink">●</span> SYSTEM_READY</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div id="clock">00:00:00</div>
                
                <div class="nav-controls" style="display: flex; gap: 10px;">
                    <button class="btn-profile" onclick="window.location.href='html/profile.html'">
                        [ PROFILE ]
                    </button>
                    <button class="btn-logout" onclick="Core.Logout()">
                        [ ABANDON_SHIP ]
                    </button>
                </div>
            </div>
        </header>

        <div class="main-area">
            
            <section class="panel todo-panel">
                <div style="padding: 15px; border-bottom: 1px solid var(--border); font-family: 'Orbitron'; font-size: 12px;">MISSION_OBJECTIVES</div>
                <div style="padding: 15px;">
                    <input type="text" id="todo-in" placeholder="ADD_OBJECTIVE..." style="width: 100%;">
                </div>
                <div id="todo-list"></div>
            </section>

            <div class="chat-wrapper">
                <section class="panel chat-panel" id="main-chat-window">
                    <div onclick="Core.toggleChat()" style="padding: 15px; border-bottom: 1px solid var(--border); font-family: 'Orbitron'; font-size: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
                        <span>COMM_LINK</span>
                        <i id="chat-toggle-icon" class="fa-solid fa-window-minimize" style="font-size: 10px; transition: 0.3s; color: var(--border);"></i>
                    </div>
                    
                    <div id="chat-content">
                        <div id="chat-stream"></div>
                        
                        <div class="input-box" style="display: flex; gap: 5px; align-items: center; padding: 10px; flex-shrink: 0; ">
                            <input type="text" id="chat-in" placeholder="TYPE_MESSAGE..." maxlength="100" style="flex: 1;">
                            <button id="chat-send-btn" onclick="Core.Chat.send()" title="SEND_DATA">
                                <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div class="audio-link" id="audio-btn" onclick="Core.Audio.toggle()">
                <div class="bars">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
                <span>MUSIC_ENGINE</span>
            </div>
            <div style="font-size: 10px; opacity: 0.5;">LOC: ORBIT_STATION_L1</div>
        </div>

    </div>

    <a href="html/battle.html" id="scroll-to-game" class="scroll-arrow" style="text-decoration: none; display: flex; flex-direction: column; align-items: center; margin-top: 30px;">
        <span>[ INITIALIZE COMBAT PROTOCOL ]</span>
        <div class="arrow-down"></div>
    </a>

    <div id="custom-confirm" class="confirm-overlay" style="display:none">
        <div class="confirm-box">
            <div class="confirm-header">TERMINAL_REQUEST</div>
            <div class="confirm-body">ERASE_DATA_STREAM?</div>
            <div class="confirm-actions">
                <button id="confirm-yes">CONFIRM</button>
                <button id="confirm-no">ABORT</button>
            </div>
        </div>
    </div>



    <div id="stats-link" onclick="window.location.href='html/stats.html'" 
        style="position:fixed; right:0; top:50%; transform:translateY(-50%); 
                background:rgba(0,255,255,0.1); border:1px solid #0ff; 
                padding:15px 5px; cursor:pointer; z-index:9999; border-radius:10px 0 0 10px;">
        <span style="color:#0ff; writing-mode: vertical-rl; text-orientation: upright; font-size:12px; letter-spacing:2px;">RANKING ▶️</span>
    </div>

    <div id="user-popover" class="popover-hidden">
        <div class="popover-content">
            <img id="pop-avatar" src="" referrerpolicy="no-referrer">
            <div class="pop-info">
                <div id="pop-nick">PILOT_NAME</div>
                <div class="pop-stats">
                    <div id="pop-rank" style="font-size: 10px; font-weight: bold; margin-bottom: 5px;"></div>
                    <span>KILLS: <b id="pop-kills">0</b></span>
                    <span>MSGS: <b id="pop-msgs">0</b></span>
                    <span>UFO_HUNT: <b id="pop-ufo">0</b></span>
                </div>
            </div>
        </div>
    </div>

    <div id="private-panel" class="private-panel-hidden" style="min-width: 250px; min-height: 300px;">
    <div class="private-header" id="private-drag-handle" style="cursor: move;">
        <div class="status-indicator"></div>
        <span id="private-target-name">SECURE_LINE</span>
        <button onclick="CommModule.closePanel(event)" class="close-comm-btn">[ X ]</button>
    </div>
    
    <div id="private-messages"></div>

    <div class="private-actions">
        <input type="text" id="private-in" placeholder="TYPE_SIGNAL...">
        <button onclick="CommModule.sendPrivate()" id="private-send-btn">SEND</button>
        <button onclick="VoiceModule.startCall()" id="private-call-btn">CALL</button>
    </div>
    
    <div id="private-resizer" style="width: 10px; height: 10px; background: var(--neon-pink); position: absolute; right: 0; bottom: 0; cursor: nwse-resize; opacity: 0.5;"></div>
</div>

<div id="voice-overlay" class="hidden-voice">
    <div class="voice-window">
        <div class="voice-status-tag">SECURE CONNECTION</div>
        
        <div class="voice-user-info">
            <div class="avatar-ring">
                <img id="voice-target-avatar" src="assets/default-avatar.png">
                <div class="pulse-ring"></div>
            </div>
            <h2 id="voice-target-nick">UNKNOWN PILOT</h2>
            <p id="voice-status">Connecting...</p>
        </div>
        
        <div class="voice-actions">
            <button id="mute-btn" class="v-btn" onclick="VoiceModule.toggleMute()">
                <svg id="mute-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <button id="hangup-btn" class="v-btn hangup" onclick="VoiceModule.endCall()">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" transform="rotate(135 12 12)"/></svg>
            </button>
        </div>
    </div>
</div>


<audio id="remote-audio" autoplay style="display:none"></audio>


<audio id="remote-audio" autoplay style="display:none"></audio>


    

<script src="js/init-core.js"></script>
<script type="module" src="js/confirm.js"></script>
<script type="module" src="js/comm.js"></script>
<script type="module" src="js/chat.js"></script>

<script src="js/script.js" type="module"></script>

<script src="js/game.js" type="module"></script>

<script type="module" src="js/voice.js"></script>

</body>
</html>
