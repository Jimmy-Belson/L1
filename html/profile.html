<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ORBITRON - USER_PROFILE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="profile-page">
    
    <div id="notify-container"></div>

    <canvas id="starfield"></canvas>

    <div class="os-container">
        <div class="panel profile-card">
            <h2 class="panel-header">>> EDIT_PILOT_DATA</h2>
            
            <div class="profile-content">
                <label>CURRENT_AVATAR:</label>
                <div class="avatar-wrapper">
                    <img id="avatar-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=pilot&backgroundColor=001a2d" alt="Avatar">
                    
                    <input type="file" id="avatar-file" accept="image/*" style="display: none;">
                    
                    <button class="nav-btn" id="upload-btn">
                        [ UPLOAD_NEW_IMAGE ]
                    </button>
                </div>

                <label>PILOT_CALLSIGN:</label>
                <input type="text" id="nick-input" class="input-field" placeholder="Enter callsign...">

                <div class="profile-actions">
                    <button id="save-btn" class="save-btn">
                        [ SYNC_WITH_STATION ]
                    </button>
                    
                    <a href="../index.html" class="back-link"><< RETURN_TO_DECK</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="module" src="../js/script.js"></script>
    <script type="module" src="../js/profile.js"></script>

</body>
</html>
