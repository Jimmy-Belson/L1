<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBITRON - COMBAT SECTOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #01050a;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
        }

        #game-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; 
            background: #000;
        }

        /* Контейнер интерфейса (справа) */
        .game-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(0, 10, 20, 0.85);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 20px;
            backdrop-filter: blur(10px);
            min-width: 250px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 15px;
            color: #0ff;
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 11px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 5px 12px;
            transition: 0.3s;
        }

        .back-btn:hover { background: #0ff; color: #000; }

        .tactical-log h3 {
            font-family: 'Orbitron';
            color: #0ff;
            font-size: 13px;
            margin: 0 0 10px 0;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }

        #highscores-list { list-style: none; padding: 0; margin: 0; }

        .log-entry {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            font-size: 11px;
            background: rgba(0, 255, 255, 0.03);
            margin-bottom: 3px;
        }

        .waiting-overlay {
            position: fixed;
            inset: 0;
            background: #01050a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #0ff;
            gap: 20px;
            transition: opacity 0.8s ease;
        }

        .loader-bar {
            width: 200px; height: 2px;
            background: rgba(0, 255, 255, 0.1);
            position: relative; overflow: hidden;
        }

        .loader-bar::after {
            content: ''; position: absolute;
            left: -100%; width: 100%; height: 100%;
            background: #0ff; animation: loading 1.5s infinite;
        }

        @keyframes loading { 100% { left: 100%; } }
    </style>
</head>
<body>

    <div class="waiting-overlay">
        <div style="font-family: 'Orbitron'; letter-spacing: 3px;">ESTABLISHING_LINK...</div>
        <div class="loader-bar"></div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div class="game-container">
        <a href="index.html" class="back-btn">[ EXIT_TO_STATION ]</a>
        <div class="tactical-log">
            <h3>Tactical Log</h3>
            <ul id="highscores-list">
                <li style="opacity: 0.5;">SCANNING_SECTOR...</li>
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="/js/init-core.js"></script>

    <script src="/js/script.js" type="module"></script>

    <script type="module">
        import { getRankByScore } from '/js/ranks.js';

        async function bootstrap() {
            const overlay = document.querySelector('.waiting-overlay');
            console.log("SYSTEM: INITIATING_BOOTSTRAP...");

            // Функция ожидания появления Core.sb
            const getCore = () => {
                return new Promise((resolve) => {
                    const check = () => {
                        if (window.Core && window.Core.sb) resolve(window.Core);
                        else setTimeout(check, 50);
                    };
                    check();
                });
            };

            try {
                const Core = await getCore();
                
                // Проверка сессии
                const { data: { session }, error } = await Core.sb.auth.getSession();
                
                if (error || !session) {
                    console.error("AUTH_REQUIRED");
                    window.location.replace('index.html');
                    return;
                }

                Core.user = session.user;
                
                // Запускаем игру (флаг для game.js)
                window.gameActive = true;

                // Загружаем лидерборд
                await updateTacticalLog(Core);

                // Убираем экран загрузки
                if (overlay) {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.remove(), 800);
                }

            } catch (err) {
                console.error("CRITICAL_BOOT_ERROR:", err);
            }
        }

async function updateTacticalLog(Core) {
    const logList = document.getElementById('highscores-list');
    if (!logList) return;

    // Пробуем достать данные. Убедись, что в Supabase колонка называется 'nickname'
    const { data, error } = await Core.sb
        .from('profiles')
        .select('nickname, combat_score')
        .order('combat_score', { ascending: false })
        .limit(8);

    if (error) {
        console.error("Log error:", error);
        return;
    }

    logList.innerHTML = '';
    data.forEach((pilot, i) => {
        // Если nickname пустой, выводим часть email или ID
        const name = pilot.nickname || "PILOT_UNKNOWN";
        const score = pilot.combat_score || 0;
        
        const li = document.createElement('li');
        li.className = 'log-entry';
        // Добавим немного стиля, чтобы ник был ярче
        li.innerHTML = `
            <span style="color:#0ff; font-weight:bold;">${i+1}.</span>
            <span style="flex-grow:1; margin-left:10px; color:#fff;">${name.toUpperCase()}</span>
            <span style="color:#ff00e5; font-family:'Orbitron';">${score}</span>
        `;
        logList.appendChild(li);
    });
}

        // ЗАПУСК
        bootstrap();
    </script>

    <script type="module" src="./game.js"></script>

</body>

</html>
